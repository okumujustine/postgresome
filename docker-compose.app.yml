# The standalone Postgresome development stack: TimescaleDB, backend, and
# a hot-reloading frontend served by Vite inside Docker.

name: postgresome-app


services:
  postgresome-db:
    image: timescale/timescaledb:latest-pg16
    container_name: postgresome-app-db
    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgresome_app

    ports:
      - "55434:5432"

    volumes:
      - postgresome_app_data:/var/lib/postgresql/data

    command:
      - postgres
      - -c
      - shared_preload_libraries=timescaledb

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10


  migrate:
    build:
      context: .
      dockerfile: backend/migrate/Dockerfile
    container_name: postgresome-migrate

    environment:
      POSTGRESOME_DATABASE_URL: postgres://postgres:postgres@postgresome-db:5432/postgresome_app?sslmode=disable

    depends_on:
      postgresome-db:
        condition: service_healthy


  api:
    build:
      context: .
      dockerfile: backend/api/Dockerfile
    container_name: postgresome-api
    restart: unless-stopped

    environment:
      API_ADDR: ":9090"
      POSTGRESOME_DATABASE_URL: postgres://postgres:postgres@postgresome-db:5432/postgresome_app?sslmode=disable
      POSTGRESOME_SECRET_KEY: postgresome-dev-secret-key

    ports:
      - "9090:9090"

    depends_on:
      postgresome-db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully


  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile.dev
    container_name: postgresome-frontend
    restart: unless-stopped

    environment:
      VITE_API_PROXY_TARGET: http://api:9090
      CHOKIDAR_USEPOLLING: "true"

    command: npm run dev -- --host 0.0.0.0 --port 5173

    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

    ports:
      - "5173:5173"

    depends_on:
      - api


volumes:
  postgresome_app_data:
  frontend_node_modules:

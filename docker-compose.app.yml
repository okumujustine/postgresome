# The standalone Postgresome application stack: TimescaleDB, backend, and
# frontend. Started with `make docker-up`.

name: postgresome-app


services:
  postgresome-db:
    image: timescale/timescaledb:latest-pg16
    container_name: postgresome-app-db
    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgresome_app

    ports:
      - "55434:5432"

    volumes:
      - postgresome_app_data:/var/lib/postgresql/data

    command:
      - postgres
      - -c
      - shared_preload_libraries=timescaledb

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10


  migrate:
    build:
      context: .
      dockerfile: cloud/migrate/Dockerfile
    container_name: postgresome-migrate

    environment:
      POSTGRESOME_DATABASE_URL: postgres://postgres:postgres@postgresome-db:5432/postgresome_app?sslmode=disable

    depends_on:
      postgresome-db:
        condition: service_healthy


  api:
    build:
      context: .
      dockerfile: cloud/api/Dockerfile
    container_name: postgresome-api
    restart: unless-stopped

    environment:
      API_ADDR: ":9090"
      POSTGRESOME_DATABASE_URL: postgres://postgres:postgres@postgresome-db:5432/postgresome_app?sslmode=disable

    ports:
      - "9090:9090"

    depends_on:
      postgresome-db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully


  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:9090
    container_name: postgresome-frontend
    restart: unless-stopped

    ports:
      - "5173:80"

    depends_on:
      - api


volumes:
  postgresome_app_data:

# Optional sample PostgreSQL instances for local development and future
# source-setup experiments. Started with `make postgres-up`.

name: postgresome-db


services:
  postgres-primary:
    image: timescale/timescaledb:latest-pg16
    container_name: postgresome-primary
    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgresome_test

    ports:
      - "55432:5432"

    volumes:
      - postgresome_primary_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d

    command:
      - postgres
      - -c
      - shared_preload_libraries=timescaledb,pg_stat_statements
      - -c
      - pg_stat_statements.track=all

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10


  postgres-secondary:
    image: postgres:16
    container_name: postgresome-secondary
    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgresome_secondary

    ports:
      - "55433:5432"

    volumes:
      - postgresome_secondary_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d

    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_stat_statements
      - -c
      - pg_stat_statements.track=all

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10


volumes:
  postgresome_primary_data:
  postgresome_secondary_data:
